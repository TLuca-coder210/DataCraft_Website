<!DOCTYPE html>
<html lang="en">
<head>
    <title>Calculator - DataCraft</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculator_style.css" type="text/css">
</head>
<body>
    <div class="container">
        <main>
            <div class="opening">
                <div class="text">
                    <h1 class="title">Property Estimator</h1>
                    <p class="subtitle">Enter your property details below to get an instant AI-driven price estimation.</p>
                    
                    <form id="propertyForm" class="estimator-form">
                        <div class="input-field">
                            <label for="surface">Surface (m²)</label>
                            <input type="number" id="surface" placeholder="e.g. 50" required>
                        </div>

                        <div class="input-field">
                            <label for="rooms">Rooms</label>
                            <input type="number" id="rooms" placeholder="1" required>
                        </div>

                        <div class="input-field">
                            <label for="neighborhood">Neighborhood (1-10)</label>
                            <input type="number" id="neighborhood" min="1" max="10" placeholder="5" required>
                        </div>

                        <button type="submit" class="create">Calculate Now</button>
                    </form>

                    <div id="result-display" style="margin-top: 20px; padding: 20px; border: 2px dashed #2ec6a7; border-radius: 10px; background-color: rgba(46, 198, 167, 0.1);">
                        <h2 style="color: white; font-family: sans-serif;">
                            Estimated Price: <span id="final-price" style="color: #2ec6a7; font-weight: bold;"></span> €
                        </h2>
                    </div>
                </div>
                
                </div>
        </main>
    </div>

    <script src="calculator.js"></script>
</body>
</html>
